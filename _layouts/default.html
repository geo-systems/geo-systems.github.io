<!doctype html>
<html lang="en-US">
  <head>
    {% include page-head.html %}
    {% if page.canonical_url %}<link rel="canonical" href="{{ page.canonical_url }}"/>{% endif %}
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <a href="/" class="site-logo">
          <span class="logo-dot"></span>Geo Systems
        </a>
        {% include nav.html %}
      </div>
    </header>

    <main class="page-wrapper">
      <div class="page-hero">
        <h1>{{ page.title | default: site.title }}</h1>
        {% if page.subtitle %}
        <p class="subtitle">{{ page.subtitle }}</p>
        {% endif %}
      </div>
      <div class="page-content">
        {{ content }}
      </div>
    </main>

    {% include footer.html %}
    {% include ga.html %}
  </body>
</html>
